<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Squad Absences</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@500&display=swap" rel="stylesheet">

<!-- ============================================================
  CONFIGURATION — EDIT THIS SECTION
  1. Go to https://console.firebase.google.com
  2. Create a project (free Spark plan)
  3. Go to Build > Realtime Database > Create database
  4. Choose "Start in test mode" (allows read/write)
  5. Copy your database URL below (looks like https://your-project-default-rtdb.firebaseio.com)
============================================================ -->
<script>
  const FIREBASE_URL = "https://YOUR-PROJECT-default-rtdb.firebaseio.com";
  const TEAM_NAME    = "FC Les Copains"; // Change to your team name
</script>
<!-- ============================================================ -->

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green:   #2EB87E;
    --green-d: #1a8a5c;
    --green-l: #d4f5e7;
    --red:     #f25c5c;
    --red-l:   #fde8e8;
    --amber:   #f5a623;
    --amber-l: #fef3dc;
    --bg:      #0f1117;
    --bg2:     #181c27;
    --bg3:     #1f2435;
    --border:  rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text:    #f0f2f8;
    --muted:   #8b91a8;
    --card-r:  14px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.6;
  }

  /* ── Header ── */
  header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 0 1.5rem;
    display: flex;
    align-items: center;
    gap: 14px;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    width: 38px; height: 38px;
    background: var(--green);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .logo svg { width: 22px; height: 22px; }
  header h1 { font-size: 17px; font-weight: 600; letter-spacing: -.2px; }
  header .sub { font-size: 13px; color: var(--muted); margin-left: auto; }

  /* ── Layout ── */
  main { max-width: 820px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }

  /* ── Tabs ── */
  .tabs {
    display: flex; gap: 4px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 4px;
    margin-bottom: 1.75rem;
  }
  .tab {
    flex: 1; padding: 9px 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px; font-weight: 500;
    border: none; border-radius: 9px;
    background: transparent; color: var(--muted);
    cursor: pointer; transition: all .18s;
    text-align: center;
  }
  .tab:hover { color: var(--text); }
  .tab.active { background: var(--green); color: #fff; }

  /* ── Cards ── */
  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--card-r);
    padding: 1.25rem 1.5rem;
    margin-bottom: .75rem;
  }
  .card-title {
    font-size: 13px; font-weight: 600;
    letter-spacing: .06em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 1rem;
  }

  /* ── Form ── */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media(max-width:480px){ .form-grid { grid-template-columns: 1fr; } }
  .form-field { display: flex; flex-direction: column; gap: 5px; }
  .form-field.full { grid-column: 1 / -1; }
  label { font-size: 12px; font-weight: 600; letter-spacing: .04em; text-transform: uppercase; color: var(--muted); }
  input[type=text], input[type=date] {
    font-family: 'DM Sans', sans-serif;
    font-size: 14px; font-weight: 500;
    background: var(--bg3); color: var(--text);
    border: 1px solid var(--border2);
    border-radius: 9px; padding: 10px 14px;
    outline: none; transition: border .18s;
    width: 100%;
  }
  input[type=text]::placeholder { color: var(--muted); font-weight: 400; }
  input:focus { border-color: var(--green); }
  input[type=date]::-webkit-calendar-picker-indicator { filter: invert(.5); cursor: pointer; }

  /* ── Buttons ── */
  .btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 14px; font-weight: 600;
    padding: 10px 20px; border-radius: 9px;
    border: none; cursor: pointer; transition: all .18s;
    display: inline-flex; align-items: center; gap: 7px;
  }
  .btn-primary { background: var(--green); color: #fff; }
  .btn-primary:hover { background: var(--green-d); }
  .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
  .btn-ghost {
    background: transparent; color: var(--muted);
    border: 1px solid var(--border2); font-size: 12px;
    padding: 5px 12px; border-radius: 7px;
  }
  .btn-ghost:hover { color: var(--red); border-color: var(--red); }

  /* ── Error / success ── */
  .msg { font-size: 13px; padding: 9px 14px; border-radius: 8px; margin-top: 10px; }
  .msg-error { background: var(--red-l); color: #b91c1c; }
  .msg-ok    { background: var(--green-l); color: #15803d; }

  /* ── Absence rows ── */
  .player-block { margin-bottom: 1.25rem; }
  .player-header {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: .6rem;
  }
  .avatar {
    width: 34px; height: 34px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; flex-shrink: 0;
  }
  .player-name { font-weight: 600; font-size: 15px; }
  .absence-row {
    display: flex; align-items: center; justify-content: space-between;
    gap: 10px; padding: 10px 14px;
    background: var(--bg3); border-radius: 9px;
    margin-bottom: 6px; flex-wrap: wrap;
  }
  .absence-dates {
    font-family: 'DM Mono', monospace;
    font-size: 13px; color: var(--text);
  }
  .absence-reason { font-size: 13px; color: var(--muted); flex: 1; }
  .badge {
    font-size: 11px; font-weight: 700; letter-spacing: .05em;
    padding: 3px 9px; border-radius: 5px; text-transform: uppercase;
  }
  .badge-now  { background: var(--red-l);   color: var(--red); }
  .badge-past { background: var(--bg2);      color: var(--muted); border: 1px solid var(--border); }
  .badge-soon { background: var(--amber-l);  color: var(--amber); }

  /* ── Check tab ── */
  .check-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1.25rem; }
  @media(max-width:480px){ .check-grid { grid-template-columns: 1fr; } }
  .check-card { background: var(--bg3); border-radius: 10px; padding: 1rem; }
  .check-card h3 { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; margin-bottom: .75rem; }
  .check-card h3.absent-title { color: var(--red); }
  .check-card h3.avail-title  { color: var(--green); }
  .check-player { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .check-player span { font-size: 14px; }
  .check-reason { font-size: 12px; color: var(--muted); }
  .empty { font-size: 13px; color: var(--muted); }

  /* ── Stats bar ── */
  .stats { display: flex; gap: .75rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .stat {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 10px; padding: .75rem 1.1rem; flex: 1; min-width: 110px;
  }
  .stat-val { font-size: 22px; font-weight: 600; }
  .stat-lbl { font-size: 12px; color: var(--muted); margin-top: 2px; }

  /* ── Config warning ── */
  .config-warn {
    background: var(--amber-l); color: #92400e;
    border: 1px solid #f5a623; border-radius: 10px;
    padding: 1rem 1.25rem; margin-bottom: 1.5rem; font-size: 14px;
  }
  .config-warn strong { display: block; margin-bottom: .25rem; font-size: 15px; }
  .config-warn code { font-family: monospace; background: rgba(0,0,0,.1); padding: 2px 6px; border-radius: 4px; }

  /* ── Spinner ── */
  .spinner {
    width: 32px; height: 32px; border-radius: 50%;
    border: 3px solid var(--border2);
    border-top-color: var(--green);
    animation: spin .7s linear infinite;
    margin: 2rem auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Divider ── */
  hr { border: none; border-top: 1px solid var(--border); margin: 1.25rem 0; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/>
      <path d="M12 2a10 10 0 0 1 6.6 17.5M5.4 4.5A10 10 0 0 0 12 22"/>
      <path d="m2 12 5-2 3 4 4-1 3 3 4-4"/>
    </svg>
  </div>
  <h1 id="team-name-header">Squad Absences</h1>
  <span class="sub" id="header-sub">Loading…</span>
</header>

<main>
  <div id="config-warning" class="config-warn" style="display:none">
    <strong>⚠️ Firebase not configured</strong>
    Open <code>index.html</code> in a text editor and set your <code>FIREBASE_URL</code> at the top of the file. See the instructions in the comments.
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('add')">+ Add absence</button>
    <button class="tab" onclick="switchTab('list')">All absences</button>
    <button class="tab" onclick="switchTab('check')">Check a date</button>
  </div>

  <!-- ADD TAB -->
  <div id="tab-add">
    <div class="card">
      <div class="card-title">Declare an absence</div>
      <div class="form-grid">
        <div class="form-field full">
          <label>Your name</label>
          <input type="text" id="inp-name" placeholder="e.g. Lucas Martin" autocomplete="name">
        </div>
        <div class="form-field">
          <label>From</label>
          <input type="date" id="inp-from">
        </div>
        <div class="form-field">
          <label>To</label>
          <input type="date" id="inp-to">
        </div>
        <div class="form-field full">
          <label>Reason (optional)</label>
          <input type="text" id="inp-reason" placeholder="Holidays, injury, work, wedding…">
        </div>
      </div>
      <div id="add-msg" style="display:none"></div>
      <hr>
      <button class="btn btn-primary" id="add-btn" onclick="addAbsence()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
        Save absence
      </button>
    </div>
  </div>

  <!-- LIST TAB -->
  <div id="tab-list" style="display:none">
    <div class="stats">
      <div class="stat"><div class="stat-val" id="stat-total">—</div><div class="stat-lbl">Total absences</div></div>
      <div class="stat"><div class="stat-val" id="stat-players">—</div><div class="stat-lbl">Players listed</div></div>
      <div class="stat"><div class="stat-val" id="stat-now" style="color:var(--red)">—</div><div class="stat-lbl">Absent today</div></div>
    </div>
    <div id="list-content"><div class="spinner"></div></div>
  </div>

  <!-- CHECK TAB -->
  <div id="tab-check" style="display:none">
    <div class="card">
      <div class="card-title">Who's available?</div>
      <div class="form-field" style="max-width:260px">
        <label>Pick a date</label>
        <input type="date" id="inp-check" oninput="checkDate()">
      </div>
    </div>
    <div id="check-result"></div>
  </div>
</main>

<script>
/* ── Helpers ── */
const COLORS = [
  {fg:'#2EB87E',bg:'rgba(46,184,126,.15)'},{fg:'#f25c5c',bg:'rgba(242,92,92,.13)'},
  {fg:'#7c6ee6',bg:'rgba(124,110,230,.13)'},{fg:'#f5a623',bg:'rgba(245,166,35,.13)'},
  {fg:'#38bdf8',bg:'rgba(56,189,248,.13)'},{fg:'#fb7185',bg:'rgba(251,113,133,.13)'},
  {fg:'#a78bfa',bg:'rgba(167,139,250,.13)'},{fg:'#34d399',bg:'rgba(52,211,153,.13)'},
];
let colorMap={}, colorIdx=0;
function playerColor(name){ if(!colorMap[name]){colorMap[name]=colorIdx%COLORS.length;colorIdx++;} return COLORS[colorMap[name]]; }
function initials(n){ return n.trim().split(' ').map(w=>w[0]?.toUpperCase()||'').slice(0,2).join(''); }
function today(){ return new Date().toISOString().split('T')[0]; }
function fmtDate(d){
  if(!d) return '';
  const [y,m,day]=d.split('-');
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${parseInt(day)} ${months[parseInt(m)-1]}`;
}

/* ── Firebase REST ── */
const DB = FIREBASE_URL.replace(/\/$/,'');
function isConfigured(){ return !DB.includes('YOUR-PROJECT'); }

async function fbGet(){
  const r=await fetch(`${DB}/absences.json`);
  const d=await r.json();
  if(!d) return [];
  return Object.entries(d).map(([id,v])=>({...v,_key:id}));
}
async function fbPush(data){
  const r=await fetch(`${DB}/absences.json`,{method:'POST',body:JSON.stringify(data),headers:{'Content-Type':'application/json'}});
  return r.json();
}
async function fbDelete(key){
  await fetch(`${DB}/absences/${key}.json`,{method:'DELETE'});
}

/* ── State ── */
let absences=[];

async function loadAbsences(){
  if(!isConfigured()){
    document.getElementById('config-warning').style.display='';
    absences=[];
    return;
  }
  try{ absences=await fbGet(); rebuildColors(); }
  catch(e){ console.error(e); }
}
function rebuildColors(){ absences.forEach(a=>{ if(!colorMap[a.name]){colorMap[a.name]=colorIdx%COLORS.length;colorIdx++;} }); }

/* ── Tabs ── */
let currentTab='add';
function switchTab(t){
  ['add','list','check'].forEach(id=>{
    document.getElementById('tab-'+id).style.display=id===t?'':'none';
    document.querySelectorAll('.tab')[['add','list','check'].indexOf(id)].classList.toggle('active',id===t);
  });
  currentTab=t;
  if(t==='list') renderList();
  if(t==='check'){ const d=document.getElementById('inp-check').value; if(d) checkDate(); }
}

/* ── Add absence ── */
async function addAbsence(){
  const name=document.getElementById('inp-name').value.trim();
  const from=document.getElementById('inp-from').value;
  const to=document.getElementById('inp-to').value;
  const reason=document.getElementById('inp-reason').value.trim();
  const msgEl=document.getElementById('add-msg');
  const btn=document.getElementById('add-btn');

  function showMsg(text,type){ msgEl.className='msg msg-'+type; msgEl.textContent=text; msgEl.style.display=''; }

  if(!isConfigured()){ showMsg('Firebase is not configured. Edit the FIREBASE_URL in index.html.','error'); return; }
  if(!name){ showMsg('Please enter your name.','error'); return; }
  if(!from||!to){ showMsg('Please choose a start and end date.','error'); return; }
  if(from>to){ showMsg('The end date must be after the start date.','error'); return; }

  msgEl.style.display='none';
  btn.disabled=true; btn.textContent='Saving…';

  try{
    await fbPush({name,from,to,reason,added:new Date().toISOString()});
    await loadAbsences();
    updateHeader();
    document.getElementById('inp-name').value='';
    document.getElementById('inp-from').value='';
    document.getElementById('inp-to').value='';
    document.getElementById('inp-reason').value='';
    showMsg('Absence saved successfully!','ok');
  }catch(e){
    showMsg('Error saving. Check your Firebase configuration.','error');
  }
  btn.disabled=false;
  btn.innerHTML='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg> Save absence';
}

/* ── Render list ── */
function renderList(){
  updateStats();
  const el=document.getElementById('list-content');
  const t=today();
  const sorted=[...absences].sort((a,b)=>a.from.localeCompare(b.from));

  if(!sorted.length){ el.innerHTML='<p class="empty">No absences recorded yet. Be the first to add one!</p>'; return; }

  const grouped={};
  sorted.forEach(a=>{ if(!grouped[a.name]) grouped[a.name]=[]; grouped[a.name].push(a); });

  let html='';
  Object.keys(grouped).sort().forEach(name=>{
    const {fg,bg}=playerColor(name);
    html+=`<div class="player-block">
      <div class="player-header">
        <div class="avatar" style="background:${bg};color:${fg}">${initials(name)}</div>
        <span class="player-name">${name}</span>
      </div>`;
    grouped[name].forEach(a=>{
      const active=a.from<=t&&a.to>=t;
      const past=a.to<t;
      const soon=!active&&!past&&a.from<=new Date(Date.now()+7*86400000).toISOString().split('T')[0];
      let badge='';
      if(active) badge='<span class="badge badge-now">Absent now</span>';
      else if(past) badge='<span class="badge badge-past">Past</span>';
      else if(soon) badge='<span class="badge badge-soon">This week</span>';
      html+=`<div class="absence-row">
        <span class="absence-dates">${fmtDate(a.from)} → ${fmtDate(a.to)}</span>
        ${a.reason?`<span class="absence-reason">${a.reason}</span>`:'<span class="absence-reason"></span>'}
        ${badge}
        <button class="btn btn-ghost" onclick="removeAbsence('${a._key}')">Delete</button>
      </div>`;
    });
    html+='</div>';
  });
  el.innerHTML=html;
}

async function removeAbsence(key){
  if(!confirm('Delete this absence?')) return;
  await fbDelete(key);
  await loadAbsences();
  renderList();
  updateHeader();
}

/* ── Stats ── */
function updateStats(){
  const t=today();
  const nowAbsent=new Set(absences.filter(a=>a.from<=t&&a.to>=t).map(a=>a.name));
  document.getElementById('stat-total').textContent=absences.length;
  document.getElementById('stat-players').textContent=new Set(absences.map(a=>a.name)).size;
  document.getElementById('stat-now').textContent=nowAbsent.size;
}
function updateHeader(){
  document.getElementById('team-name-header').textContent=TEAM_NAME;
  const t=today();
  const absent=new Set(absences.filter(a=>a.from<=t&&a.to>=t).map(a=>a.name));
  document.getElementById('header-sub').textContent=
    absent.size>0 ? `${absent.size} player${absent.size!==1?'s':''} absent today` : 'Everyone available today';
}

/* ── Check date ── */
function checkDate(){
  const d=document.getElementById('inp-check').value;
  const el=document.getElementById('check-result');
  if(!d){ el.innerHTML=''; return; }

  const absent=absences.filter(a=>a.from<=d&&a.to>=d);
  const allNames=[...new Set(absences.map(a=>a.name))];
  const available=allNames.filter(n=>!absent.find(a=>a.name===n));

  let html='<div class="check-grid">';

  html+=`<div class="check-card"><h3 class="absent-title">Absent (${absent.length})</h3>`;
  if(!absent.length) html+='<p class="empty">Nobody declared absent</p>';
  absent.forEach(a=>{
    const {fg,bg}=playerColor(a.name);
    html+=`<div class="check-player">
      <div class="avatar" style="width:28px;height:28px;font-size:11px;background:${bg};color:${fg}">${initials(a.name)}</div>
      <div><span>${a.name}</span>${a.reason?`<div class="check-reason">${a.reason}</div>`:''}</div>
    </div>`;
  });
  html+=`</div>`;

  html+=`<div class="check-card"><h3 class="avail-title">Available (${available.length})</h3>`;
  if(!allNames.length) html+='<p class="empty">No players in the system yet</p>';
  else if(!available.length) html+='<p class="empty">No players available</p>';
  available.forEach(n=>{
    const {fg,bg}=playerColor(n);
    html+=`<div class="check-player">
      <div class="avatar" style="width:28px;height:28px;font-size:11px;background:${bg};color:${fg}">${initials(n)}</div>
      <span>${n}</span>
    </div>`;
  });
  html+=`</div></div>`;
  el.innerHTML=html;
}

/* ── Init ── */
(async()=>{
  await loadAbsences();
  updateHeader();
  if(currentTab==='list') renderList();
})();
</script>
</body>
</html>
